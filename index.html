<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zantray CEO Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#070B14;color:#fff;min-height:100vh}
    .login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
    .login-card{background:#1A1A2E;border-radius:24px;padding:40px;width:100%;max-width:400px;border:1px solid rgba(255,255,255,0.08);text-align:center}
    .login-logo{font-size:56px;margin-bottom:8px}
    .login-title{font-size:28px;font-weight:700;margin-bottom:4px}
    .login-title span{color:#FFD600}
    .login-sub{color:rgba(255,255,255,0.4);font-size:13px;margin-bottom:32px}
    .login-input{width:100%;background:#070B14;border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 16px;color:#fff;font-size:15px;margin-bottom:16px;outline:none;text-align:center;letter-spacing:3px}
    .login-input:focus{border-color:#FF6B35}
    .login-btn{width:100%;background:#FF6B35;color:#fff;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:700;cursor:pointer}
    .login-btn:hover{background:#e55a25}
    .login-error{color:#FF4444;font-size:13px;margin-top:12px}
    .dashboard{display:none;padding:24px;max-width:1400px;margin:0 auto}
    .dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:0.5px solid rgba(255,255,255,0.07);flex-wrap:wrap;gap:12px}
    .dash-logo{font-size:22px;font-weight:700}
    .dash-logo span{color:#FF6B35}
    .dash-sub{font-size:12px;color:rgba(255,255,255,0.3);margin-top:3px}
    .dash-right{display:flex;gap:10px;align-items:center}
    .live-badge{display:flex;align-items:center;gap:5px;font-size:11px;color:#4CAF50;background:rgba(76,175,80,0.1);border:0.5px solid rgba(76,175,80,0.3);padding:4px 12px;border-radius:20px}
    .live-dot{width:6px;height:6px;border-radius:50%;background:#4CAF50;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
    .health-score{text-align:right}
    .health-val{font-size:28px;font-weight:700;color:#FF6B35}
    .health-label{font-size:10px;color:rgba(255,255,255,0.3)}
    .btn{padding:8px 16px;border-radius:10px;cursor:pointer;font-size:12px;font-weight:600;border:none}
    .btn-refresh{background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.1);color:#fff}
    .btn-logout{background:transparent;border:0.5px solid #FF4444;color:#FF4444}
    .kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:16px}
    .kpi{background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px;position:relative;overflow:hidden;cursor:pointer;transition:all 0.2s}
    .kpi:hover{border-color:rgba(255,107,53,0.4);transform:translateY(-2px)}
    .kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
    .kpi.o::before{background:#FF6B35}.kpi.p::before{background:#7B2FBE}.kpi.b::before{background:#2196F3}.kpi.g::before{background:#4CAF50}.kpi.y::before{background:#FFD600}.kpi.r::before{background:#FF9800}
    .kpi-icon{font-size:18px;margin-bottom:8px}
    .kpi-val{font-size:26px;font-weight:700;color:#fff}
    .kpi-label{font-size:10px;color:rgba(255,255,255,0.4);margin-top:2px}
    .kpi-trend{font-size:10px;margin-top:5px;font-weight:600}
    .row{display:grid;gap:12px;margin-bottom:16px}
    .row-3{grid-template-columns:2fr 1fr 1fr}
    .row-2{grid-template-columns:1fr 1fr}
    .row-2b{grid-template-columns:2fr 1fr}
    .row-3b{grid-template-columns:1fr 1fr 1fr}
    .panel{background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px}
    .pt{font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
    .pt-badge{font-size:10px;background:rgba(255,255,255,0.06);padding:2px 8px;border-radius:6px;color:rgba(255,255,255,0.4);text-transform:none;letter-spacing:0;font-weight:400}
    .bar-row{margin-bottom:10px}
    .bar-label{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:4px}
    .bar-bg{height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
    .bar-fill{height:100%;border-radius:3px;transition:width 1s ease}
    .metric-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid rgba(255,255,255,0.05);font-size:12px;color:rgba(255,255,255,0.5)}
    .metric-item:last-child{border:none}
    .metric-item strong{color:#fff;font-weight:500}
    .u-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid rgba(255,255,255,0.05)}
    .u-row:last-child{border:none}
    .av{width:28px;height:28px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
    .badge{display:inline-block;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:600}
    .bp{background:rgba(123,47,190,0.2);color:#9B51E0}
    .bb{background:rgba(33,150,243,0.2);color:#2196F3}
    .bg{background:rgba(76,175,80,0.2);color:#4CAF50}
    .bo{background:rgba(255,107,53,0.2);color:#FF6B35}
    .by{background:rgba(255,214,0,0.2);color:#FFD600}
    table{width:100%;border-collapse:collapse}
    th{text-align:left;font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:0.5px;padding:6px 10px;border-bottom:0.5px solid rgba(255,255,255,0.06);text-transform:uppercase}
    td{padding:10px;font-size:12px;border-bottom:0.5px solid rgba(255,255,255,0.04);color:rgba(255,255,255,0.8)}
    tr:hover td{background:rgba(255,255,255,0.02)}
    .goal-bar{height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin-top:4px;margin-bottom:10px}
    .goal-fill{height:100%;border-radius:2px}
    .rev-panel{background:rgba(255,107,53,0.06);border:0.5px solid rgba(255,107,53,0.2);border-radius:12px;padding:16px}
    .rev-val{font-size:36px;font-weight:700;color:#FF6B35;margin:8px 0}
    .rev-proj{background:rgba(255,255,255,0.04);border-radius:10px;padding:12px;margin-top:10px}
    .map-wrap{position:relative;width:100%;border-radius:8px;overflow:hidden;background:#0D1221;margin-bottom:12px}
    .map-legend{display:flex;gap:16px;flex-wrap:wrap}
    .legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,0.5)}
    .legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .loading{text-align:center;padding:60px 20px;color:rgba(255,255,255,0.4)}
    .spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,0.1);border-top-color:#FF6B35;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .last-updated{font-size:11px;color:rgba(255,255,255,0.3);text-align:center;margin-top:16px;padding-bottom:40px}
    @media(max-width:768px){.kpi-grid{grid-template-columns:repeat(3,1fr)}.row-3,.row-2,.row-2b,.row-3b{grid-template-columns:1fr}}
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">🌴</div>
    <div class="login-title">Zan<span>tray</span></div>
    <div class="login-sub">CEO Analytics Dashboard · Private Access</div>
    <input type="password" class="login-input" id="passwordInput" placeholder="Enter your password" onkeypress="if(event.key==='Enter')login()"/>
    <button class="login-btn" onclick="login()">Access Dashboard</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <div class="dash-header">
    <div>
      <div class="dash-logo">Zan<span>tray</span> CEO Dashboard</div>
      <div class="dash-sub">Business Intelligence · Real-time data · <span id="dashDate"></span></div>
    </div>
    <div class="dash-right">
      <div class="health-score">
        <div class="health-val">94</div>
        <div class="health-label">Health Score</div>
      </div>
      <button class="btn btn-refresh" onclick="loadAll()">🔄 Refresh</button>
      <button class="btn btn-logout" onclick="logout()">Log Out</button>
      <div class="live-badge"><div class="live-dot"></div>Live</div>
    </div>
  </div>

  <div id="content">
    <div class="loading"><div class="spinner"></div>Loading your analytics...</div>
  </div>

  <div class="last-updated" id="lastUpdated"></div>
</div>

<script>
const BACKEND = 'https://zantray-backend.onrender.com';
const avatarColors = ['#FF6B35','#FF9A3C','#00B4D8','#FFD600','#06D6A0','#7B2FBE','#E91E63','#FF5722'];
let pwd = '';
let charts = {};

document.getElementById('dashDate').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

function login() {
  pwd = document.getElementById('passwordInput').value;
  if (!pwd) return;
  loadAll();
}

function logout() {
  pwd = '';
  Object.values(charts).forEach(c => c.destroy());
  charts = {};
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('passwordInput').value = '';
  document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div>Loading your analytics...</div>';
}

function timeAgo(date) {
  const diff = Date.now() - new Date(date).getTime();
  const mins = Math.floor(diff/60000), hours = Math.floor(diff/3600000), days = Math.floor(diff/86400000);
  if (mins < 1) return 'Just now';
  if (mins < 60) return `${mins}m ago`;
  if (hours < 24) return `${hours}h ago`;
  return `${days}d ago`;
}

function getLangFlag(lang) {
  return {'Haitian Creole':'🇭🇹','English':'🇺🇸','French':'🇫🇷','Spanish':'🇪🇸'}[lang] || '🌍';
}

function getLangColor(lang) {
  return {'Haitian Creole':'#FF6B35','English':'#2196F3','French':'#4CAF50','Spanish':'#FFD600'}[lang] || '#7B2FBE';
}

function av(name, i) {
  return `<div class="av" style="background:${avatarColors[i%avatarColors.length]}">${(name||'?')[0].toUpperCase()}</div>`;
}

function drawMap(locations) {
  const canvas = document.getElementById('worldMap');
  if (!canvas) return;
  const w = canvas.parentElement.clientWidth || 600;
  canvas.width = w;
  canvas.height = 220;
  const ctx = canvas.getContext('2d');
  const h = 220;

  ctx.fillStyle = '#0D1221';
  ctx.fillRect(0, 0, w, h);

  const continents = [
    [[0.08,0.20],[0.23,0.17],[0.29,0.24],[0.27,0.50],[0.19,0.57],[0.08,0.52],[0.06,0.35]],
    [[0.30,0.20],[0.47,0.18],[0.53,0.27],[0.51,0.60],[0.43,0.70],[0.31,0.62],[0.25,0.46],[0.27,0.28]],
    [[0.54,0.18],[0.71,0.16],[0.77,0.24],[0.75,0.50],[0.67,0.56],[0.57,0.52],[0.51,0.38]],
    [[0.57,0.60],[0.71,0.57],[0.77,0.67],[0.73,0.86],[0.63,0.88],[0.55,0.77],[0.53,0.65]],
    [[0.81,0.26],[0.98,0.24],[1.00,0.60],[0.95,0.80],[0.83,0.82],[0.77,0.67],[0.79,0.44]],
    [[0.55,0.10],[0.75,0.08],[0.80,0.16],[0.72,0.18],[0.58,0.16]],
  ];

  continents.forEach(s => {
    ctx.beginPath();
    ctx.moveTo(s[0][0]*w, s[0][1]*h);
    s.slice(1).forEach(p => ctx.lineTo(p[0]*w, p[1]*h));
    ctx.closePath();
    ctx.fillStyle = '#1a2340';
    ctx.fill();
    ctx.strokeStyle = '#2a3560';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  });

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    ctx.beginPath(); ctx.moveTo(0, i*h/4); ctx.lineTo(w, i*h/4); ctx.stroke();
  }
  for (let i = 0; i <= 8; i++) {
    ctx.beginPath(); ctx.moveTo(i*w/8, 0); ctx.lineTo(i*w/8, h); ctx.stroke();
  }

  if (!locations || locations.length === 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('No location data yet — users need to log in', w/2, h/2);
    return;
  }

  const countryCoords = {
    'United States': {x:0.20,y:0.38},
    'Haiti': {x:0.285,y:0.50},
    'France': {x:0.475,y:0.28},
    'Canada': {x:0.18,y:0.25},
    'Jamaica': {x:0.275,y:0.52},
    'United Kingdom': {x:0.455,y:0.22},
    'Germany': {x:0.49,y:0.24},
    'Brazil': {x:0.315,y:0.65},
    'Mexico': {x:0.18,y:0.47},
    'Dominican Republic': {x:0.295,y:0.49},
    'Guadeloupe': {x:0.30,y:0.51},
    'Martinique': {x:0.305,y:0.52},
    'Spain': {x:0.46,y:0.30},
  };

  locations.forEach((loc, i) => {
    const coords = countryCoords[loc._id] || {x: loc.lng ? (loc.lng+180)/360 : 0.5, y: loc.lat ? (90-loc.lat)/180 : 0.5};
    const x = w * coords.x;
    const y = h * coords.y;
    const size = Math.min(6 + loc.count * 3, 20);
    const color = avatarColors[i % avatarColors.length];

    ctx.beginPath(); ctx.arc(x, y, size*2.5, 0, Math.PI*2);
    ctx.fillStyle = color + '18'; ctx.fill();
    ctx.beginPath(); ctx.arc(x, y, size*1.4, 0, Math.PI*2);
    ctx.fillStyle = color + '40'; ctx.fill();
    ctx.beginPath(); ctx.arc(x, y, size*0.7, 0, Math.PI*2);
    ctx.fillStyle = color; ctx.fill();

    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.font = `bold ${Math.max(9,size*0.8)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(`${loc.flag||'🌍'} ${loc._id} (${loc.count})`, x, y - size - 8);
  });
}

function destroyChart(id) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
}

async function loadAll() {
  try {
    const [overviewRes, usersRes, messagesRes, sajRes, statusesRes, locationsRes] = await Promise.all([
      fetch(`${BACKEND}/analytics/overview?password=${encodeURIComponent(pwd)}`),
      fetch(`${BACKEND}/analytics/users?password=${encodeURIComponent(pwd)}`),
      fetch(`${BACKEND}/analytics/messages?password=${encodeURIComponent(pwd)}`),
      fetch(`${BACKEND}/analytics/saj?password=${encodeURIComponent(pwd)}`),
      fetch(`${BACKEND}/analytics/statuses?password=${encodeURIComponent(pwd)}`),
      fetch(`${BACKEND}/analytics/locations?password=${encodeURIComponent(pwd)}`),
    ]);

    const [overview, users, messages, saj, statuses, locations] = await Promise.all([
      overviewRes.json(), usersRes.json(), messagesRes.json(),
      sajRes.json(), statusesRes.json(), locationsRes.json()
    ]);

    if (!overview.success) {
      document.getElementById('loginError').textContent = '❌ Wrong password.';
      return;
    }

    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';

    const totalLang = overview.languages.reduce((a,l) => a+l.count, 0);

    document.getElementById('content').innerHTML = `
      <!-- KPIs -->
      <div class="kpi-grid">
        <div class="kpi o"><div class="kpi-icon">👥</div><div class="kpi-val">${overview.totalUsers}</div><div class="kpi-label">Total Users</div><div class="kpi-trend" style="color:#4CAF50">↑ +${overview.newUsersThisWeek} this week</div></div>
        <div class="kpi p"><div class="kpi-icon">🧠</div><div class="kpi-val">${overview.totalSajConversations}</div><div class="kpi-label">Saj AI Sessions</div><div class="kpi-trend" style="color:#9B51E0">${(overview.totalSajConversations/Math.max(overview.totalUsers,1)).toFixed(1)}x avg/user</div></div>
        <div class="kpi b"><div class="kpi-icon">💬</div><div class="kpi-val">${overview.totalMessages}</div><div class="kpi-label">Messages Sent</div><div class="kpi-trend" style="color:#2196F3">${(overview.totalMessages/Math.max(overview.totalUsers,1)).toFixed(1)}x avg/user</div></div>
        <div class="kpi g"><div class="kpi-icon">⭕</div><div class="kpi-val">${overview.totalStatuses}</div><div class="kpi-label">Statuses Posted</div><div class="kpi-trend" style="color:#4CAF50">${(overview.totalStatuses/Math.max(overview.totalUsers,1)).toFixed(1)}x avg/user</div></div>
        <div class="kpi y"><div class="kpi-icon">🌍</div><div class="kpi-val">${locations.byCountry?.length||0}</div><div class="kpi-label">Countries</div><div class="kpi-trend" style="color:#FFD600">${locations.byCountry?.map(c=>c.flag).join(' ')||'—'}</div></div>
        <div class="kpi r"><div class="kpi-icon">💎</div><div class="kpi-val">$0</div><div class="kpi-label">MRR</div><div class="kpi-trend" style="color:#FF9800">Launch soon!</div></div>
      </div>

      <!-- Row 1: Line chart + Doughnut + Bar -->
      <div class="row row-3">
        <div class="panel">
          <div class="pt">Engagement trends <span class="pt-badge">Last 7 days</span></div>
          <div style="position:relative;height:160px"><canvas id="cLine"></canvas></div>
          <div style="display:flex;gap:16px;margin-top:10px">
            <div style="display:flex;align-items:center;gap:5px;font-size:10px;color:rgba(255,255,255,0.4)"><span style="width:14px;height:2px;background:#7B2FBE;display:inline-block;border-radius:1px"></span>Saj AI</div>
            <div style="display:flex;align-items:center;gap:5px;font-size:10px;color:rgba(255,255,255,0.4)"><span style="width:14px;height:2px;background:#2196F3;display:inline-block;border-radius:1px"></span>Messages</div>
            <div style="display:flex;align-items:center;gap:5px;font-size:10px;color:rgba(255,255,255,0.4)"><span style="width:14px;height:2px;background:#4CAF50;display:inline-block;border-radius:1px"></span>Statuses</div>
          </div>
        </div>
        <div class="panel">
          <div class="pt">Activity split</div>
          <div style="position:relative;height:110px;margin-bottom:12px"><canvas id="cDough"></canvas></div>
          <div style="display:flex;flex-direction:column;gap:5px">
            <div style="display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,0.5)"><span style="display:flex;align-items:center;gap:5px"><span style="width:7px;height:7px;border-radius:2px;background:#7B2FBE"></span>Saj AI</span><span style="color:#fff">${Math.round(overview.totalSajConversations/(overview.totalSajConversations+overview.totalMessages+overview.totalStatuses)*100)}%</span></div>
            <div style="display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,0.5)"><span style="display:flex;align-items:center;gap:5px"><span style="width:7px;height:7px;border-radius:2px;background:#2196F3"></span>Messages</span><span style="color:#fff">${Math.round(overview.totalMessages/(overview.totalSajConversations+overview.totalMessages+overview.totalStatuses)*100)}%</span></div>
            <div style="display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,0.5)"><span style="display:flex;align-items:center;gap:5px"><span style="width:7px;height:7px;border-radius:2px;background:#4CAF50"></span>Statuses</span><span style="color:#fff">${Math.round(overview.totalStatuses/(overview.totalSajConversations+overview.totalMessages+overview.totalStatuses)*100)}%</span></div>
          </div>
        </div>
        <div class="panel">
          <div class="pt">Daily signups <span class="pt-badge">30 days</span></div>
          <div style="position:relative;height:160px"><canvas id="cBar"></canvas></div>
        </div>
      </div>

      <!-- Row 2: World map + Languages -->
      <div class="row row-2">
        <div class="panel">
          <div class="pt">Global user distribution <span class="pt-badge">${locations.byCountry?.length||0} countries · ${locations.users?.length||0} located</span></div>
          <div class="map-wrap" style="height:220px"><canvas id="worldMap"></canvas></div>
          <div class="map-legend">
            ${(locations.byCountry||[]).map((c,i) => `<div class="legend-item"><div class="legend-dot" style="background:${avatarColors[i%avatarColors.length]}"></div>${c.flag||'🌍'} ${c._id} — ${c.count} user${c.count>1?'s':''}</div>`).join('')}
            ${(!locations.byCountry||locations.byCountry.length===0) ? '<div style="font-size:11px;color:rgba(255,255,255,0.3)">Log in on the app to capture locations</div>' : ''}
          </div>
        </div>
        <div class="panel">
          <div class="pt">Languages</div>
          ${overview.languages.sort((a,b)=>b.count-a.count).map(l => `
            <div class="bar-row">

async function loadPendingListings() {
  try {
    const res = await fetch(`${BACKEND}/business/admin/pending?password=${encodeURIComponent(pwd)}`);
    const data = await res.json();
    const container = document.getElementById('pendingListings');
    const countBadge = document.getElementById('pendingCount');
    if (!data.success) { container.innerHTML = '<div style="text-align:center;padding:20px;color:rgba(255,255,255,0.3)">Could not load listings</div>'; return; }
    const pending = data.pending || [];
    countBadge.textContent = `${pending.length} pending`;
    if (pending.length === 0) {
      container.innerHTML = '<div style="text-align:center;padding:20px;color:rgba(255,255,255,0.3)">✅ No pending listings right now</div>';
      return;
    }
    container.innerHTML = pending.map(b => `
      <div style="background:rgba(255,255,255,0.03);border:0.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px;margin-bottom:12px">
        <div style="display:flex;gap:12px;align-items:flex-start">
          ${b.photos?.[0] ? `<img src="${b.photos[0]}" style="width:64px;height:64px;border-radius:8px;object-fit:cover;flex-shrink:0" />` : '<div style="width:64px;height:64px;border-radius:8px;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">🏪</div>'}
          <div style="flex:1;min-width:0">
            <div style="font-size:15px;font-weight:700;color:#fff;margin-bottom:4px">${b.name} <span style="font-size:10px;background:rgba(255,214,0,0.15);color:#FFD600;padding:2px 8px;border-radius:6px">${b.category}</span></div>
            <div style="font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:2px">📍 ${b.address}, ${b.city}, ${b.country}</div>
            <div style="font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:2px">📞 ${b.phone || '—'} · 🕐 ${b.hours || '—'}</div>
            <div style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:8px">${b.description || '—'}</div>
            <div style="font-size:11px;color:rgba(255,255,255,0.3);margin-bottom:8px">Submitted by ${b.ownerEmail} · ${new Date(b.createdAt).toLocaleDateString()}</div>
            ${b.photos?.length > 1 ? `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">${b.photos.slice(1).map(p => `<img src="${p}" style="width:48px;height:48px;border-radius:6px;object-fit:cover" />`).join('')}</div>` : ''}
            <div style="display:flex;gap:8px">
              <button onclick="reviewListing('${b._id}','approved')" style="background:rgba(76,175,80,0.15);border:0.5px solid #4CAF50;color:#4CAF50;padding:7px 16px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">✅ Approve</button>
              <button onclick="reviewListing('${b._id}','rejected')" style="background:rgba(255,68,68,0.1);border:0.5px solid #FF4444;color:#FF4444;padding:7px 16px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">❌ Reject</button>
            </div>
          </div>
        </div>
      </div>
    `).join('');
  } catch(err) {
    document.getElementById('pendingListings').innerHTML = '<div style="text-align:center;padding:20px;color:rgba(255,255,255,0.3)">Could not load listings</div>';
  }
}

async function reviewListing(id, status) {
  try {
    const res = await fetch(`${BACKEND}/business/admin/review/${id}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd, status })
    });
    const data = await res.json();
    if (data.success) {
      alert(status === 'approved' ? '✅ Listing approved and now live!' : '❌ Listing rejected.');
      await loadPendingListings();
    } else {
      alert('Error: ' + (data.error || 'Could not update listing'));
    }
  } catch(err) { alert('Could not connect to server'); }
}



  } catch(err) {
    document.getElementById('loginError').textContent = '❌ Could not connect to server.';
    console.error(err);
  }
}
