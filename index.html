<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zantray Analytics Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0F0F1A; color: #fff; min-height: 100vh; }

    /* LOGIN */
    .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .login-card { background: #1A1A2E; border-radius: 24px; padding: 40px; width: 100%; max-width: 400px; border: 1px solid #333355; text-align: center; }
    .login-logo { font-size: 48px; margin-bottom: 8px; }
    .login-title { font-size: 28px; font-weight: 800; margin-bottom: 4px; }
    .login-title span { color: #FFD600; }
    .login-sub { color: #888; font-size: 14px; margin-bottom: 32px; }
    .login-input { width: 100%; background: #0F0F1A; border: 1.5px solid #333355; border-radius: 12px; padding: 14px 16px; color: #fff; font-size: 15px; margin-bottom: 16px; outline: none; text-align: center; letter-spacing: 3px; }
    .login-input:focus { border-color: #FF6B35; }
    .login-btn { width: 100%; background: #FF6B35; color: #fff; border: none; border-radius: 12px; padding: 16px; font-size: 16px; font-weight: 700; cursor: pointer; }
    .login-btn:hover { background: #e55a25; }
    .login-error { color: #FF4444; font-size: 13px; margin-top: 12px; }

    /* DASHBOARD */
    .dashboard { display: none; padding: 24px; max-width: 1200px; margin: 0 auto; }
    .dash-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; flex-wrap: wrap; gap: 12px; }
    .dash-logo { font-size: 24px; font-weight: 800; }
    .dash-logo span { color: #FFD600; }
    .dash-subtitle { color: #888; font-size: 13px; margin-top: 2px; }
    .dash-right { display: flex; gap: 12px; align-items: 'center'; }
    .refresh-btn { background: #1A1A2E; border: 1px solid #333355; color: #fff; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600; }
    .refresh-btn:hover { border-color: #FF6B35; }
    .logout-btn { background: transparent; border: 1px solid #FF4444; color: #FF4444; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600; }

    /* STATS GRID */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: #1A1A2E; border-radius: 16px; padding: 20px; border: 1px solid #333355; position: relative; overflow: hidden; }
    .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
    .stat-card.orange::before { background: #FF6B35; }
    .stat-card.purple::before { background: #7B2FBE; }
    .stat-card.blue::before { background: #2196F3; }
    .stat-card.green::before { background: #4CAF50; }
    .stat-card.yellow::before { background: #FFD600; }
    .stat-icon { font-size: 28px; margin-bottom: 12px; }
    .stat-value { font-size: 36px; font-weight: 800; margin-bottom: 4px; }
    .stat-label { font-size: 13px; color: #888; font-weight: 500; }
    .stat-change { font-size: 12px; margin-top: 8px; color: #4CAF50; font-weight: 600; }

    /* SECTIONS */
    .section { background: #1A1A2E; border-radius: 16px; padding: 24px; border: 1px solid #333355; margin-bottom: 24px; }
    .section-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    .section-title span { font-size: 18px; }

    /* TWO COL */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    @media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } }

    /* LANGUAGE BARS */
    .lang-item { margin-bottom: 14px; }
    .lang-label { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
    .lang-bar { height: 8px; background: #0F0F1A; border-radius: 4px; overflow: hidden; }
    .lang-fill { height: 100%; border-radius: 4px; transition: width 1s ease; }

    /* USERS TABLE */
    .users-table { width: 100%; border-collapse: collapse; }
    .users-table th { text-align: left; font-size: 11px; color: #888; letter-spacing: 0.5px; padding: 8px 12px; border-bottom: 1px solid #333355; }
    .users-table td { padding: 12px; font-size: 13px; border-bottom: 1px solid #1A1A2E; }
    .users-table tr:hover td { background: rgba(255,107,53,0.05); }
    .user-avatar { width: 32px; height: 32px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: #fff; margin-right: 8px; }
    .badge { display: inline-block; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
    .badge-green { background: rgba(76,175,80,0.2); color: #4CAF50; }
    .badge-purple { background: rgba(123,47,190,0.2); color: #9B51E0; }
    .badge-blue { background: rgba(33,150,243,0.2); color: #2196F3; }
    .badge-orange { background: rgba(255,107,53,0.2); color: #FF6B35; }

    /* COMING SOON */
    .coming-soon { text-align: center; padding: 40px 20px; }
    .coming-soon-icon { font-size: 48px; margin-bottom: 12px; }
    .coming-soon-text { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .coming-soon-sub { font-size: 13px; color: #888; }

    /* LOADING */
    .loading { text-align: center; padding: 60px 20px; color: #888; }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid #333355; border-top-color: #FF6B35; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .last-updated { font-size: 12px; color: #888; text-align: center; margin-top: 24px; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">🌴</div>
    <div class="login-title">Zan<span>tray</span></div>
    <div class="login-sub">Analytics Dashboard · CEO Access Only</div>
    <input type="password" class="login-input" id="passwordInput" placeholder="Enter password" onkeypress="if(event.key==='Enter') login()" />
    <button class="login-btn" onclick="login()">Access Dashboard</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <div class="dash-header">
    <div>
      <div class="dash-logo">Zan<span>tray</span> Analytics</div>
      <div class="dash-subtitle">Real-time insights · CEO Dashboard</div>
    </div>
    <div class="dash-right">
      <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>
      <button class="logout-btn" onclick="logout()">Log Out</button>
    </div>
  </div>

  <div id="content">
    <div class="loading">
      <div class="loading-spinner"></div>
      <div>Loading your analytics...</div>
    </div>
  </div>

  <div class="last-updated" id="lastUpdated"></div>
</div>

<script>
  const BACKEND = 'https://zantray-backend.onrender.com';
  const avatarColors = ['#FF6B35','#FF9A3C','#00B4D8','#FFD600','#06D6A0','#7B2FBE'];
  let password = '';

  function login() {
    const input = document.getElementById('passwordInput').value;
    if (!input) return;
    password = input;
    document.getElementById('loginError').textContent = '';
    loadData();
  }

  function logout() {
    password = '';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('passwordInput').value = '';
  }

  function getLangFlag(lang) {
    const flags = { 'Haitian Creole': '🇭🇹', 'English': '🇺🇸', 'French': '🇫🇷', 'Spanish': '🇪🇸' };
    return flags[lang] || '🌍';
  }

  function getLangColor(lang) {
    const colors = { 'Haitian Creole': '#FF6B35', 'English': '#2196F3', 'French': '#4CAF50', 'Spanish': '#FFD600' };
    return colors[lang] || '#7B2FBE';
  }

  function timeAgo(date) {
    const diff = Date.now() - new Date(date).getTime();
    const mins = Math.floor(diff / 60000);
    const hours = Math.floor(diff / 3600000);
    const days = Math.floor(diff / 86400000);
    if (mins < 1) return 'Just now';
    if (mins < 60) return `${mins}m ago`;
    if (hours < 24) return `${hours}h ago`;
    return `${days}d ago`;
  }

  async function loadData() {
    try {
      const res = await fetch(`${BACKEND}/analytics/overview?password=${encodeURIComponent(password)}`);
      const data = await res.json();

      if (!data.success) {
        document.getElementById('loginError').textContent = '❌ Wrong password. Please try again.';
        return;
      }

      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';

      const totalLangUsers = data.languages.reduce((a, l) => a + l.count, 0);

      document.getElementById('content').innerHTML = `
        <!-- STATS GRID -->
        <div class="stats-grid">
          <div class="stat-card orange">
            <div class="stat-icon">👥</div>
            <div class="stat-value">${data.totalUsers.toLocaleString()}</div>
            <div class="stat-label">Total Users</div>
            <div class="stat-change">+${data.newUsersToday} today · +${data.newUsersThisWeek} this week</div>
          </div>
          <div class="stat-card purple">
            <div class="stat-icon">🧠</div>
            <div class="stat-value">${data.totalSajConversations.toLocaleString()}</div>
            <div class="stat-label">Saj AI Conversations</div>
            <div class="stat-change">AI powered by Claude</div>
          </div>
          <div class="stat-card blue">
            <div class="stat-icon">💬</div>
            <div class="stat-value">${data.totalMessages.toLocaleString()}</div>
            <div class="stat-label">Messages Sent</div>
            <div class="stat-change">Real-time messaging</div>
          </div>
          <div class="stat-card green">
            <div class="stat-icon">⭕</div>
            <div class="stat-value">${data.totalStatuses.toLocaleString()}</div>
            <div class="stat-label">Statuses Posted</div>
            <div class="stat-change">24hr expiry</div>
          </div>
          <div class="stat-card yellow">
            <div class="stat-icon">📈</div>
            <div class="stat-value">${data.newUsersThisMonth.toLocaleString()}</div>
            <div class="stat-label">New Users This Month</div>
            <div class="stat-change">Monthly growth</div>
          </div>
          <div class="stat-card purple">
            <div class="stat-icon">💎</div>
            <div class="stat-value">0</div>
            <div class="stat-label">Saj AI Plus Subscribers</div>
            <div class="stat-change">Coming soon!</div>
          </div>
        </div>

        <div class="two-col">
          <!-- LANGUAGES -->
          <div class="section">
            <div class="section-title"><span>🌍</span> Users by Language</div>
            ${data.languages.sort((a,b) => b.count - a.count).map(l => `
              <div class="lang-item">
                <div class="lang-label">
                  <span>${getLangFlag(l._id)} ${l._id || 'Unknown'}</span>
                  <span style="color:#888">${l.count} (${Math.round(l.count/totalLangUsers*100)}%)</span>
                </div>
                <div class="lang-bar">
                  <div class="lang-fill" style="width:${Math.round(l.count/totalLangUsers*100)}%;background:${getLangColor(l._id)}"></div>
                </div>
              </div>
            `).join('')}
          </div>

          <!-- GROWTH -->
          <div class="section">
            <div class="section-title"><span>📊</span> Growth Overview</div>
            <div style="display:flex;flex-direction:column;gap:16px;">
              <div style="background:#0F0F1A;border-radius:12px;padding:16px;display:flex;justify-content:space-between;align-items:center;">
                <div>
                  <div style="font-size:13px;color:#888;margin-bottom:4px;">Today</div>
                  <div style="font-size:28px;font-weight:800;color:#FF6B35">${data.newUsersToday}</div>
                  <div style="font-size:12px;color:#888">new users</div>
                </div>
                <div style="font-size:32px">📅</div>
              </div>
              <div style="background:#0F0F1A;border-radius:12px;padding:16px;display:flex;justify-content:space-between;align-items:center;">
                <div>
                  <div style="font-size:13px;color:#888;margin-bottom:4px;">This Week</div>
                  <div style="font-size:28px;font-weight:800;color:#7B2FBE">${data.newUsersThisWeek}</div>
                  <div style="font-size:12px;color:#888">new users</div>
                </div>
                <div style="font-size:32px">📆</div>
              </div>
              <div style="background:#0F0F1A;border-radius:12px;padding:16px;display:flex;justify-content:space-between;align-items:center;">
                <div>
                  <div style="font-size:13px;color:#888;margin-bottom:4px;">This Month</div>
                  <div style="font-size:28px;font-weight:800;color:#4CAF50">${data.newUsersThisMonth}</div>
                  <div style="font-size:12px;color:#888">new users</div>
                </div>
                <div style="font-size:32px">🗓️</div>
              </div>
            </div>
          </div>
        </div>

        <!-- RECENT USERS -->
        <div class="section">
          <div class="section-title"><span>👥</span> Recent Users</div>
          <table class="users-table">
            <thead>
              <tr>
                <th>USER</th>
                <th>EMAIL</th>
                <th>LANGUAGE</th>
                <th>JOINED</th>
              </tr>
            </thead>
            <tbody>
              ${data.recentUsers.map((u, i) => `
                <tr>
                  <td>
                    <div style="display:flex;align-items:center;">
                      <div class="user-avatar" style="background:${avatarColors[i % avatarColors.length]}">${(u.name || '?')[0].toUpperCase()}</div>
                      <span style="font-weight:600">${u.name || 'Zantray User'}</span>
                    </div>
                  </td>
                  <td style="color:#888">${u.email || 'N/A'}</td>
                  <td><span class="badge badge-purple">${getLangFlag(u.preferredLanguage)} ${u.preferredLanguage || 'English'}</span></td>
                  <td style="color:#888">${timeAgo(u.createdAt)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>

        <!-- SAJ AI PLUS COMING SOON -->
        <div class="section">
          <div class="section-title"><span>💎</span> Saj AI Plus — Revenue</div>
          <div class="coming-soon">
            <div class="coming-soon-icon">🚀</div>
            <div class="coming-soon-text">Saj AI Plus Coming Soon!</div>
            <div class="coming-soon-sub">Subscription revenue tracking will appear here once you launch Saj AI Plus. Get ready to monetize! 💰</div>
          </div>
        </div>
      `;

      document.getElementById('lastUpdated').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;

    } catch (err) {
      document.getElementById('loginError').textContent = '❌ Could not connect to server. Try again.';
    }
  }
</script>
</body>
</html>
